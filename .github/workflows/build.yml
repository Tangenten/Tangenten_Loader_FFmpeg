# Build the Tangenten LibAV bridge (tangenten_libav_bridge) across platforms.
#
# Produces per-platform artifacts:
#   Linux   -> linux_x86_64/*.so
#   macOS   -> mac_x86_64/*.dylib       (Intel)
#            mac_arm64/*.dylib          (Apple Silicon)
#   Windows -> windows_x86_64/*.dll

name: Build LibAV Bridge

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev pkg-config

      - name: Build bridge
        run: cd LibAV && bash build_linux.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libav-bridge-linux-x86_64
          path: LibAV/linux_x86_64/

  build-macos-x86_64:
    name: macOS x86_64 (Intel)
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg development headers
        run: brew install ffmpeg

      - name: Build bridge
        run: cd LibAV && bash build_macos.sh x86_64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libav-bridge-macos-x86_64
          path: LibAV/mac_x86_64/

  build-macos-arm64:
    name: macOS arm64 (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg development headers
        run: brew install ffmpeg

      - name: Build bridge
        run: cd LibAV && bash build_macos.sh arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libav-bridge-macos-arm64
          path: LibAV/mac_arm64/

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg dev headers (gyan.dev)
        shell: pwsh
        run: |
          curl.exe -L -o ffmpeg-dev.7z https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full-shared.7z
          7z x ffmpeg-dev.7z -offmpeg_dev
          $dir = Get-ChildItem -Path ffmpeg_dev -Directory | Select-Object -First 1
          "FFMPEG_DIR=$($dir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build bridge
        shell: cmd
        run: cd LibAV && call build_windows.bat

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libav-bridge-windows-x86_64
          path: LibAV/windows_x86_64/
